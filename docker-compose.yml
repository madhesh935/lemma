# ============================================================
# AEGIS-OS Docker Compose — Full Stack
# Lemma SDK Forensic Intelligence Platform
# ============================================================
version: "3.9"

services:
  # ─── Frontend (TanStack Start) ─────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE=http://backend:8000
    depends_on:
      - backend
    networks:
      - aegis-net

  # ─── Backend (FastAPI + Lemma SDK) ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://aegis:aegis_secret@postgres:5432/aegis_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=aegis_neo4j
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-32chars}
      - DEBUG=false
      - ALLOWED_ORIGINS=http://localhost:3000,http://frontend:3000
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - aegis-uploads:/app/pod_files
    networks:
      - aegis-net

  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aegis_db
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aegis-net

  # ─── Neo4j (Knowledge Graph) ──────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    environment:
      NEO4J_AUTH: neo4j/aegis_neo4j
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p aegis_neo4j 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - aegis-net

  # ─── ChromaDB (Vector Store) ──────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - aegis-net

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  chroma-data:
  aegis-uploads:

# ─── Networks ─────────────────────────────────────────────────
networks:
  aegis-net:
    driver: bridge
